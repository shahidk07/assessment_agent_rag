<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SHL Assessment Assistant</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100 min-h-screen flex justify-center items-center p-5">

    <div class="w-full max-w-4xl bg-white rounded-2xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-black text-white p-5">
            <h1 class="text-2xl font-bold">
                SHL Assessment Assistant
            </h1>

            <p class="text-sm text-gray-300 mt-1">
                AI-powered recruiter recommendation system
            </p>
        </div>

        <!-- Chat Box -->
        <div id="chat-box" class="h-[600px] overflow-y-auto bg-gray-50 p-5 space-y-4">

            <!-- Initial Message -->
            <div class="flex justify-start">
                <div class="bot-message">
                    Hello! I can help you discover SHL assessments.
                    What role are you hiring for?
                </div>
            </div>

        </div>

        <!-- Input Area -->
        <div class="border-t p-4 flex gap-3 bg-white">

            <input type="text" id="user-input" placeholder="Type your recruiter query..."
                class="flex-1 border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black" />

            <button id="send-btn" class="bg-black text-white px-6 py-3 rounded-xl hover:bg-gray-800">
                Send
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
