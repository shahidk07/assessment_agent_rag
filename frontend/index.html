<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>SHL Assessment Assistant</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-gray-100 min-h-screen flex justify-center items-center p-5">

    <div class="w-full max-w-3xl sm:max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden mx-auto">

        <!-- Header -->
        <div class="bg-black text-white p-5">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold">
                        SHL Assessment Assistant
                    </h1>
                    <p class="text-sm text-gray-300 mt-1">
                        AI-powered recruiter recommendation system
                    </p>
                </div>
                <div class="flex items-center gap-3">
                    <a href="/health" class="text-xs text-gray-300 hover:text-white">Health check</a>
                    <button id="new-chat-btn" class="bg-white text-black text-sm font-semibold px-4 py-2 rounded-xl hover:bg-gray-100 transition">
                        New Chat
                    </button>
                </div>
            </div>
            <p class="text-xs text-gray-300 mt-4">Built by Shahid Khan</p>
        </div>

        <!-- Chat Box -->
        <div id="chat-box" class="h-[420px] overflow-y-auto bg-gray-50 p-4 space-y-4">

            <!-- Initial Message -->
            <div class="flex justify-start">
                <div class="bot-message">Hello! I can help you discover SHL assessments. What role are you hiring for?</div>
            </div>

        </div>

        <!-- Loading Indicator -->
        <div id="loading-indicator" class="hidden flex justify-start p-4 bg-gray-50" role="status" aria-live="polite">
            <div class="flex items-center gap-2">
                <div class="loader"></div>
                <span class="text-sm text-gray-600">Processing your request...</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="border-t p-4 flex gap-3 bg-white">

            <input type="text" id="user-input" placeholder="Type your recruiter query..."
                class="flex-1 border border-gray-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-black" />

            <button id="send-btn" class="bg-black text-white px-6 py-3 rounded-xl hover:bg-gray-800">
                Send
            </button>

        </div>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
