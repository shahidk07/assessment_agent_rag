[pytest]
# Pytest Configuration for Phase 12 Testing

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum Python version
minversion = 7.0

# Markers for test categorization
markers =
    functional: Functional testing (API responses, schema validation)
    conversation: Conversation testing (greeting, clarification, refinement)
    retrieval: Retrieval testing (semantic relevance, accuracy)
    scenario: Example test scenarios from Phase 12
    edge: Edge case testing
    performance: Performance and reliability testing
    slow: Tests that take significant time to execute

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options
[coverage:run]
source = app
omit =
    */tests/*
    */venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
